[project]
name = "py-shared"
version = "0.7.0"
description = "Shared Python: config, auth (D44 JWT bridge), Supabase client, Bitwarden loader"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
    "pydantic-settings>=2.4",
    "pyjwt[crypto]>=2.9",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_shared"]
